const RANK_THRESHOLDS=[0,1,10,100,1000,10000,100000,1000000,1000000000000];
function parseXP(v){
  if(typeof v==="number") return v;
  const s=String(v).trim().toLowerCase().replace(/,/g,"");
  if(s==="")return 0;
  const m={t:1e12,b:1e9,m:1e6,k:1e3};
  for(const [sfx,mul] of Object.entries(m)){
    if(s.endsWith(sfx)){const n=parseFloat(s);return isNaN(n)?0:Math.round(n*mul);}
  }
  return parseInt(s)||0;
}
function formatXP(n){
  n=Number(n);
  if(n>=1e12)return(n/1e12).toFixed(n%1e12===0?0:1)+"t";
  if(n>=1e9)return(n/1e9).toFixed(n%1e9===0?0:1)+"b";
  if(n>=1e6)return(n/1e6).toFixed(n%1e6===0?0:1)+"m";
  if(n>=1e3)return(n/1e3).toFixed(n%1e3===0?0:1)+"k";
  return String(n);
}

function simpleHash(str){let h=0;for(let i=0;i<str.length;i++){h=((h<<5)-h)+str.charCodeAt(i);h|=0;}return String(h);}

function PinScreen({onUnlock,hasPin,onSetPin}){
  const [input,setInput]=useState("");
  const [newPin,setNewPin]=useState("");
  const [confirm,setConfirm]=useState("");
  const [error,setError]=useState("");
  const [shake,setShake]=useState(false);

  function doShake(){setShake(true);setTimeout(()=>setShake(false),600);}

  function handleKey(d){
    if(d==="⌫"){
      if(!hasPin){if(newPin.length<4)setNewPin(p=>p.slice(0,-1));else setConfirm(p=>p.slice(0,-1));}
      else setInput(p=>p.slice(0,-1));
      setError("");return;
    }
    if(!hasPin){
      if(newPin.length<4){setNewPin(p=>p+d);}
      else if(confirm.length<4){
        const nc=confirm+d;
        setConfirm(nc);
        if(nc.length===4){
          if(newPin===nc){onSetPin(simpleHash(newPin));onUnlock();}
          else{setError("PINs do not match");doShake();setTimeout(()=>{setConfirm("");setError("");},800);}
        }
      }
      return;
    }
    const next=input+d;
    setInput(next);
    if(next.length===4){
      if(simpleHash(next)===localStorage.getItem(PIN_KEY)){onUnlock();}
      else{setError("WRONG PIN");doShake();setTimeout(()=>{setInput("");setError("");},800);}
    }
  }

  const activeVal=!hasPin?(newPin.length<4?newPin:confirm):input;
  const phase=!hasPin?(newPin.length<4?"SET YOUR PIN":"CONFIRM PIN"):"ENTER PIN";
  const pad=[["1","2","3"],["4","5","6"],["7","8","9"],["","0","⌫"]];
  const dots=(val)=>Array.from({length:4},(_,i)=>(
    <div key={i} style={{width:13,height:13,borderRadius:"50%",background:i<val.length?"#6366f1":"#1a1a2e",border:"1px solid #2a2a3e",transition:"background 0.15s"}}/>
  ));

  return(
    <div style={{minHeight:"100vh",background:"#050508",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{marginBottom:32,textAlign:"center"}}>
        <div style={{fontSize:10,letterSpacing:6,color:"#6366f133",marginBottom:6,fontFamily:"'Share Tech Mono',monospace"}}>SOLO OPERATOR</div>
        <div style={{fontSize:30,fontWeight:700,color:"#fff",fontFamily:"'Rajdhani',sans-serif",letterSpacing:3}}>LAYNE LEATHERWOOD</div>
        <div style={{width:40,height:2,background:"linear-gradient(90deg,#6366f1,#a78bfa)",margin:"12px auto 0"}}/>
      </div>
      <div style={{background:"#0a0a14",border:"1px solid #1a1a2e",padding:"32px 28px",width:"100%",maxWidth:320,display:"flex",flexDirection:"column",alignItems:"center",gap:20,transform:shake?"translateX(-6px)":"none",transition:"transform 0.1s"}}>
        <div style={{fontSize:10,letterSpacing:4,color:"#6366f166",fontFamily:"'Share Tech Mono',monospace"}}>{phase}</div>
        <div style={{display:"flex",gap:14}}>{dots(activeVal)}</div>
        {error&&<div style={{fontSize:11,color:"#fb7185",letterSpacing:3,fontFamily:"'Share Tech Mono',monospace"}}>{error}</div>}
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,width:"100%"}}>
          {pad.map((row,ri)=>row.map((d,ci)=>(
            <button key={`${ri}-${ci}`} onClick={()=>d&&handleKey(d)} style={{background:d?"#0d0d1a":"transparent",border:d?"1px solid #1a1a2e":"none",color:d==="⌫"?"#fb7185":"#e5e5e5",fontSize:d==="⌫"?18:22,fontWeight:600,padding:"16px 0",cursor:d?"pointer":"default",fontFamily:"'Rajdhani',sans-serif",borderRadius:2}}>{d}</button>
          )))}
        </div>
      </div>
      <div style={{marginTop:20,fontSize:10,color:"#222",letterSpacing:2,fontFamily:"'Share Tech Mono',monospace"}}>SECURED · LLL SERVICES</div>
    </div>
  );
}

function getRank(xp,t){t=t||RANK_THRESHOLDS;for(let i=t.length-1;i>=0;i--)if(xp>=t[i])return RANKS[i];return"F";}
function getNextXP(xp,t){t=t||RANK_THRESHOLDS;for(let i=0;i<t.length;i++)if(xp<t[i])return t[i];return t[t.length-2];}

function App(){
  const [tab,setTab]=useState("home");
  const [unlocked,setUnlocked]=useState(false);
  const [desktop,setDesktop]=useState(()=>localStorage.getItem(VIEW_KEY)==="desktop");
  const [rankThresholds,setRankThresholds]=useState(()=>{try{const s=localStorage.getItem(RANK_KEY);return s?JSON.parse(s):RANK_THRESHOLDS.slice();}catch(e){return RANK_THRESHOLDS.slice();}});
  const [settings,setSettings]=useState(()=>{try{const s=localStorage.getItem(SETTINGS_KEY);return s?{...DEFAULT_SETTINGS,...JSON.parse(s)}:DEFAULT_SETTINGS;}catch(e){return DEFAULT_SETTINGS;}});
  const [quests,setQuests]=useState(DEFAULT_QUESTS);
  const [arsenal,setArsenal]=useState(DEFAULT_ARSENAL);
  const [missions,setMissions]=useState(DEFAULT_MISSIONS);
  const [recurring,setRecurring]=useState(DEFAULT_RECURRING);
  const [bountyBank,setBountyBank]=useState(0);
  const [totalXPBank,setTotalXPBank]=useState(0);
  const [flash,setFlash]=useState(null);
  const [activeQuest,setActiveQuest]=useState(null);
  const [editingQuest,setEditingQuest]=useState(null);
  const [addingQuest,setAddingQuest]=useState(false);
  const [editingWeapon,setEditingWeapon]=useState(null);
  const [addingWeapon,setAddingWeapon]=useState(false);
  const [editingMission,setEditingMission]=useState(null);
  const [addingMission,setAddingMission]=useState(false);

  useEffect(()=>{
    try{
      // Auto-migrate: check current key, then fall back through previous versions
      let raw=localStorage.getItem(STORAGE_KEY);
      let migratedFrom=null;
      if(!raw){for(let i=0;i<PREV_KEYS.length;i++){const v=localStorage.getItem(PREV_KEYS[i]);if(v){raw=v;migratedFrom=PREV_KEYS[i];break;}}}
      if(raw){
        const d=JSON.parse(raw);
        const today=new Date().toDateString();
        const isNewDay=localStorage.getItem(DAILY_KEY)!==today;
        if(d.quests){
          const savedMap={};d.quests.forEach(q=>{savedMap[q.id]=q;});
          const merged=DEFAULT_QUESTS.map(q=>{
            const sv=savedMap[q.id];if(!sv)return q;
            const completed=(isNewDay&&sv.isDaily)?false:sv.completed;
            return {...q,completed,isDaily:sv.isDaily||false};
          });
          d.quests.forEach(q=>{if(!DEFAULT_QUESTS.find(p=>p.id===q.id))merged.push(q);});
          setQuests(merged);
        }
        if(d.arsenal){
          const aMap={};d.arsenal.forEach(w=>{aMap[w.id]=w;});
          const am=DEFAULT_ARSENAL.map(w=>{const sv=aMap[w.id];return sv?{...w,owned:sv.owned}:w;});
          d.arsenal.forEach(w=>{if(!DEFAULT_ARSENAL.find(p=>p.id===w.id))am.push(w);});
          setArsenal(am);
        }
        if(d.missions)setMissions(d.missions);
        if(d.recurring){
          const rMap={};d.recurring.forEach(r=>{rMap[r.id]=r;});
          setRecurring(DEFAULT_RECURRING.map(r=>{const sv=rMap[r.id];return sv?{...r,totalCompletions:sv.totalCompletions||0}:r;}));
        }
        if(d.bountyBank!==undefined)setBountyBank(d.bountyBank);
        if(d.totalXPBank!==undefined)setTotalXPBank(d.totalXPBank);
        if(isNewDay)localStorage.setItem(DAILY_KEY,today);
        if(migratedFrom)localStorage.setItem(STORAGE_KEY,raw);
      }
    }catch(e){console.warn("Solo Operator load:",e);}
  },[]);

  const save=useCallback((q,a,m,r,b,xb)=>{
    try{localStorage.setItem(STORAGE_KEY,JSON.stringify({quests:q,arsenal:a,missions:m,recurring:r,bountyBank:b,totalXPBank:xb}));}catch(e){}
  },[]);

  const hasPin=!!localStorage.getItem(PIN_KEY);
  function handleSetPin(hashed){localStorage.setItem(PIN_KEY,hashed);}
  if(!unlocked) return <PinScreen onUnlock={()=>setUnlocked(true)} hasPin={hasPin} onSetPin={handleSetPin}/>;

  const questXP=quests.reduce((s,q)=>q.completed?s+q.xp:s,0);
  const totalXP=questXP+totalXPBank;
  const rank=getRank(totalXP,rankThresholds);
  const rankColor=RANK_COLORS[rank];
  const nextXP=getNextXP(totalXP,rankThresholds);
  const prevXP=rankThresholds[RANKS.indexOf(rank)]||0;
  const rankPct=nextXP===prevXP?100:Math.round(((totalXP-prevXP)/(nextXP-prevXP))*100);
  const completed=quests.filter(q=>q.completed).length;
  const owned=arsenal.filter(w=>w.owned).length;
  const ac=settings.accentColor||"#6366f1";
  const hc=settings.highlightColor||"#facc15";
  const isMobile=settings.mobile!==false;

  function flash_(msg,color="#6366f1"){setFlash({msg,color});setTimeout(()=>setFlash(null),2800);}

  function quickSave(){save(quests,arsenal,missions,recurring,bountyBank,totalXPBank);flash_("SAVED ✓","#4ade80");}
  function saveRankThresholds(t){setRankThresholds(t);localStorage.setItem(RANK_KEY,JSON.stringify(t));flash_("RANKS UPDATED","#6366f1");}
  function saveSettings(s){setSettings(s);localStorage.setItem(SETTINGS_KEY,JSON.stringify(s));}

  function completeQuest(quest){
    const u=quests.map(q=>q.id===quest.id?{...q,completed:true}:q);
    const nb=bountyBank+quest.bounty;
    setQuests(u);setBountyBank(nb);setActiveQuest(null);
    save(u,arsenal,missions,recurring,nb,totalXPBank);
    flash_(`+${quest.xp} XP  •  +${quest.bounty} BOUNTY`,RANK_COLORS[quest.rank]);
  }

  function uncompleteQuest(id){
    const q=quests.find(x=>x.id===id);
    const u=quests.map(x=>x.id===id?{...x,completed:false}:x);
    const nb=bountyBank-(q?.bounty||0);
    setQuests(u);setBountyBank(nb);save(u,arsenal,missions,recurring,nb,totalXPBank);
  }

  function buyWeapon(w){
    // negative bounty allowed
    const u=arsenal.map(x=>x.id===w.id?{...x,owned:true}:x);
    const nb=bountyBank-w.cost;
    setArsenal(u);setBountyBank(nb);save(quests,u,missions,recurring,nb,totalXPBank);
    flash_(`${w.name} ACQUIRED`,RANK_COLORS["A"]);
  }

  function saveQuest(q){
    const u=quests.find(x=>x.id===q.id)?quests.map(x=>x.id===q.id?q:x):[...quests,q];
    setQuests(u);save(u,arsenal,missions,recurring,bountyBank,totalXPBank);
    setEditingQuest(null);setAddingQuest(false);flash_("QUEST SAVED","#4ade80");
  }

  function deleteQuest(id){
    const q=quests.find(x=>x.id===id);
    const u=quests.filter(q=>q.id!==id);
    const nb=q?.completed?bountyBank-(q.bounty||0):bountyBank;
    setQuests(u);setBountyBank(nb);save(u,arsenal,missions,recurring,nb,totalXPBank);setActiveQuest(null);
  }

  function saveMission(m){
    const u=missions.find(x=>x.id===m.id)?missions.map(x=>x.id===m.id?m:x):[...missions,m];
    setMissions(u);save(quests,arsenal,u,recurring,bountyBank,totalXPBank);
    setEditingMission(null);setAddingMission(false);flash_("MISSION UPDATED","#a78bfa");
  }

  function deleteMission(id){
    const u=missions.filter(m=>m.id!==id);
    setMissions(u);save(quests,arsenal,u,recurring,bountyBank,totalXPBank);setEditingMission(null);
  }

  function saveWeapon(w){
    const u=arsenal.find(x=>x.id===w.id)?arsenal.map(x=>x.id===w.id?w:x):[...arsenal,w];
    setArsenal(u);save(quests,u,missions,recurring,bountyBank,totalXPBank);
    setEditingWeapon(null);setAddingWeapon(false);flash_("ITEM SAVED","#f97316");
  }

  function completeRecurring(rid){
    const r=recurring.find(x=>x.id===rid);
    if(!r)return;
    const newCount=r.totalCompletions+1;
    const milestone=r.milestones.find(m=>m.completions===newCount);
    const bonusXP=milestone?milestone.xpBonus:0;
    const gainedXP=r.xpPerCompletion+bonusXP;
    const u=recurring.map(x=>x.id===rid?{...x,totalCompletions:newCount}:x);
    const newXPBank=totalXPBank+gainedXP;
    const newBounty=bountyBank+r.bountyPerCompletion;
    setRecurring(u);setTotalXPBank(newXPBank);setBountyBank(newBounty);
    save(quests,arsenal,missions,u,newBounty,newXPBank);
    if(milestone){
      flash_(`MILESTONE: ${milestone.label} — +${gainedXP} XP BONUS!`,"#facc15");
    } else {
      flash_(`+${gainedXP} XP${r.bountyPerCompletion>0?` • +${r.bountyPerCompletion}`:""}`,RANK_COLORS["D"]);
    }
  }

  function handleImport(d){
    if(d.quests)setQuests(d.quests);
    if(d.arsenal)setArsenal(d.arsenal);
    if(d.missions)setMissions(d.missions);
    if(d.recurring)setRecurring(d.recurring);
    if(d.bountyBank!==undefined)setBountyBank(d.bountyBank);
    if(d.totalXPBank!==undefined)setTotalXPBank(d.totalXPBank);
    save(d.quests||quests,d.arsenal||arsenal,d.missions||missions,d.recurring||recurring,d.bountyBank??bountyBank,d.totalXPBank??totalXPBank);
    flash_("SAVE RESTORED","#4ade80");
  }

  const p={quests,arsenal,missions,recurring,bountyBank,totalXP,rankThresholds,quickSave,saveRankThresholds,settings,saveSettings,ac,hc,isMobile,activeQuest,setActiveQuest,completeQuest,uncompleteQuest,deleteQuest,buyWeapon,saveQuest,saveMission,saveWeapon,deleteMission,completeRecurring,editingQuest,setEditingQuest,editingMission,setEditingMission,editingWeapon,setEditingWeapon,addingQuest,setAddingQuest,addingWeapon,setAddingWeapon,addingMission,setAddingMission,setTab,rank,rankColor,completed,owned,flash_};

  return(
    <div style={{minHeight:"100vh",background:"#050508",paddingBottom:isMobile?80:0,paddingLeft:isMobile?0:120,fontSize:(settings.fontSize||14)+"px",display:"flex",flexDirection:isMobile?"column":"row"}}>
      {flash&&<div style={{position:"fixed",top:20,left:"50%",zIndex:1000,background:"#0a0a14",border:`1px solid ${flash.color}`,padding:"10px 24px",fontSize:10,letterSpacing:4,color:flash.color,animation:"flashIn 2.8s forwards",whiteSpace:"nowrap",boxShadow:`0 0 20px ${flash.color}44`}}>{flash.msg}</div>}

      {/* HEADER */}
      <div style={{background:"#0d0d1a",borderBottom:"1px solid #111",padding:"18px 20px 12px",position:"sticky",top:0,zIndex:50}}>
        <div style={{maxWidth:760,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:12,flexWrap:"wrap"}}>
            <div>
              <div style={{fontSize:9,letterSpacing:6,color:"#6366f133",marginBottom:3,fontFamily:"'Share Tech Mono',monospace"}}>SOLO OPERATOR v6</div>
              <div style={{fontSize:22,fontWeight:700,color:"#fff",letterSpacing:3,fontFamily:"'Rajdhani',sans-serif"}}>LAYNE LEATHERWOOD</div>
              <div style={{fontSize:11,letterSpacing:2,color:"#555",marginTop:1,fontFamily:"'Share Tech Mono',monospace"}}>{RANK_TITLES[rank]}</div>
            </div>
            <div style={{display:"flex",gap:12,alignItems:"center"}}>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:7,letterSpacing:3,color:"#444"}}>BOUNTY</div>
                <div style={{fontSize:15,fontWeight:900,color:bountyBank<0?"#fb7185":hc}}>{bountyBank<0?"-$"+Math.abs(bountyBank).toLocaleString():"$"+bountyBank.toLocaleString()}</div>
              </div>
              <RankBadge rank={rank} rankColor={rankColor}/>
              <button onClick={quickSave} title="Quick Save" style={{background:"none",border:"1px solid "+hc+"33",color:hc,padding:"6px 9px",cursor:"pointer",fontSize:14,lineHeight:1,borderRadius:2}}>💾</button>
              <button onClick={()=>setUnlocked(false)} title="Lock app" style={{background:"none",border:"1px solid #1a1a2e",color:"#444",padding:"6px 9px",cursor:"pointer",fontSize:14,lineHeight:1,borderRadius:2}}>🔒</button>
            </div>
          </div>
          <div style={{marginTop:10,height:3,background:"#0a0a14",overflow:"hidden"}}>
            <div style={{height:"100%",width:`${rankPct}%`,background:`linear-gradient(90deg,${ac},${rankColor})`,transition:"width 0.6s"}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:3}}>
            <span style={{fontSize:7,color:"#2a2a2a",letterSpacing:2}}>{totalXP.toLocaleString()} XP</span>
            <span style={{fontSize:7,color:"#2a2a2a",letterSpacing:2}}>{rankPct}% → {rank==="SS"?"SSS ∞":RANKS[RANKS.indexOf(rank)+1]||"MAX"}</span>
          </div>
        </div>
      </div>

      {/* CONTENT */}
      <div style={{maxWidth:760,margin:"0 auto",padding:"16px",animation:"slideIn 0.3s ease"}}>
        {tab==="home"&&<HomeTab {...p}/>}
        {tab==="quests"&&<QuestsTab {...p}/>}
        {tab==="arsenal"&&<ArsenalTab {...p}/>}
        {tab==="missions"&&<MissionsTab {...p}/>}
        {tab==="recurring"&&<RecurringTab {...p}/>}
      </div>

      {/* DATA PANEL */}
      <DataPanel quests={quests} arsenal={arsenal} missions={missions} recurring={recurring} bountyBank={bountyBank} totalXPBank={totalXPBank} rankThresholds={rankThresholds} settings={settings} onImport={handleImport} onSaveRankThresholds={saveRankThresholds} onSaveSettings={saveSettings} onChangePin={()=>setUnlocked(false)}/>

      {/* NAV */}
      <div style={{position:"fixed",bottom:isMobile?0:"auto",top:isMobile?"auto":0,left:0,right:isMobile?0:"auto",width:isMobile?"auto":110,height:isMobile?"auto":"100vh",background:"#06060f",borderTop:isMobile?"1px solid #111":"none",borderRight:isMobile?"none":"1px solid #111",display:"flex",flexDirection:isMobile?"row":"column",zIndex:50,paddingTop:isMobile?0:60,paddingBottom:isMobile?0:20,alignItems:isMobile?"stretch":"center",justifyContent:isMobile?"stretch":"flex-start",gap:isMobile?0:4}}>
        {[{id:"home",label:"HOME",icon:"⬡"},{id:"quests",label:"QUESTS",icon:"◈"},{id:"arsenal",label:"ARSENAL",icon:"⚔"},{id:"missions",label:"MISSIONS",icon:"◎"},{id:"recurring",label:"DAILY",icon:"↻"}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"11px 4px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,borderTop:`2px solid ${tab===t.id?ac:"transparent"}`}}>
            <span style={{fontSize:13,color:tab===t.id?ac:"#2a2a2a"}}>{t.icon}</span>
            <span style={{fontSize:6,letterSpacing:2,color:tab===t.id?ac:"#2a2a2a",fontFamily:"'Courier New',monospace"}}>{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

function RankBadge({rank,rankColor}){
  const isSSS=rank==="SSS";
  return(
    <div style={{textAlign:"center",border:`2px solid ${rankColor}`,padding:"5px 12px",animation:isSSS?"sssGlow 2s infinite":"glow 3s infinite",background:isSSS?"#111":undefined}}>
      {isSSS
        ? <div style={{fontSize:14,fontWeight:900,letterSpacing:2,lineHeight:1,background:"linear-gradient(90deg,#fff,#aaa,#fff)",backgroundSize:"200% auto",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",animation:"shimmer 3s linear infinite"}}>SSS</div>
        : <div style={{fontSize:20,fontWeight:700,color:rankColor,letterSpacing:3,lineHeight:1,fontFamily:"'Rajdhani',sans-serif"}}>{rank}</div>
      }
      <div style={{fontSize:7,letterSpacing:2,color:"#444",marginTop:1}}>RANK</div>
    </div>

}

function HomeTab(p){
  const next=p.quests.find(q=>!q.completed);
  const pending=p.quests.filter(q=>!q.completed&&q.bounty>0).reduce((s,q)=>s+q.bounty,0);
  return(
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      {/* RANK LADDER */}
      <RankLadder currentRank={p.rank}/>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {[{label:"TOTAL XP",value:p.totalXP.toLocaleString(),color:p.ac},{label:"QUESTS",value:`${p.completed}/${p.quests.length}`,color:p.rankColor},{label:"PIPELINE",value:`${pending.toLocaleString()}`,color:"#4ade80"},{label:"ARSENAL",value:`${p.owned}/${p.arsenal.length}`,color:"#f97316"}].map(s=>(
          <div key={s.label} style={{background:"#080810",border:"1px solid #0d0d1a",borderLeft:`3px solid ${s.color}`,padding:"12px 14px"}}>
            <div style={{fontSize:9,letterSpacing:3,color:"#444",marginBottom:3,fontFamily:"'Share Tech Mono',monospace"}}>{s.label}</div>
            <div style={{fontSize:22,fontWeight:700,color:s.color,lineHeight:1,fontFamily:"'Rajdhani',sans-serif"}}>{s.value}</div>
          </div>
        ))}
      </div>
      {next&&<div><SecHead label="ACTIVE QUEST" action="ALL QUESTS" onAction={()=>p.setTab("quests")}/><QuestCard quest={next} active={p.activeQuest?.id===next.id} onSelect={()=>p.setActiveQuest(p.activeQuest?.id===next.id?null:next)} onComplete={p.completeQuest} onDelete={p.deleteQuest} highlight/></div>}
      <div><SecHead label="RECURRING MISSIONS" action="VIEW ALL" onAction={()=>p.setTab("recurring")}/>{p.recurring.slice(0,2).map(r=><RecurringMiniCard key={r.id} r={r} ac={p.ac} onComplete={p.completeRecurring}/>)}</div>
      <div><SecHead label="LONG-TERM MISSIONS" action="VIEW ALL" onAction={()=>p.setTab("missions")}/>{p.missions.slice(0,2).map(m=><MiniMission key={m.id} mission={m}/>)}</div>
      <div><SecHead label="QUEST BOARD" action="VIEW ALL" onAction={()=>p.setTab("quests")}/>{p.quests.filter(q=>!q.completed).slice(1,4).map(q=><QuestCard key={q.id} quest={q} active={p.activeQuest?.id===q.id} onSelect={()=>p.setActiveQuest(p.activeQuest?.id===q.id?null:q)} onComplete={p.completeQuest} onDelete={p.deleteQuest}/>)}</div>
    </div>
  );
}

function RankLadder({currentRank}){
  const idx=RANKS.indexOf(currentRank);
  return(
    <div style={{background:"#080810",border:"1px solid #0d0d1a",padding:"14px 16px"}}>
      <div style={{fontSize:9,letterSpacing:4,color:"#6366f133",marginBottom:12,fontFamily:"'Share Tech Mono',monospace"}}>RANK PROGRESSION</div>
      <div style={{display:"flex",gap:4,alignItems:"center",overflowX:"auto",paddingBottom:4,scrollbarWidth:"none"}}>
        {RANKS.map((r,i)=>{
          const isCurrent=r===currentRank;
          const isPast=i<idx;
          const isSSS=r==="SSS";
          const color=RANK_COLORS[r];
          return(
            <div key={r} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,flexShrink:0,opacity:isSSS?0.3:1}}>
              <div style={{
                width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",
                border:`1px solid ${isCurrent?color:isPast?color+"44":"#1a1a2e"}`,
                background:isCurrent?color+"22":isPast?"#0a0a14":"transparent",
                fontSize:11,fontWeight:700,
                color:isCurrent?color:isPast?color+"66":"#222",
                fontFamily:"'Rajdhani',sans-serif",
              }}>
                {isPast&&!isCurrent&&<span style={{fontSize:6}}>✓</span>}
                {!isPast&&r}
                {isSSS&&<span style={{fontSize:6}}>∞</span>}
              </div>
              <div style={{fontSize:7,letterSpacing:1,color:isCurrent?color:"#1a1a2e",textAlign:"center",maxWidth:36,lineHeight:1.2,fontFamily:"'Share Tech Mono',monospace"}}>
                {isCurrent?"YOU":RANK_TITLES[r].split("·")[0].trim()}
              </div>
              {i<RANKS.length-1&&<div style={{width:8,height:1,background:"#1a1a2e",position:"absolute"}}/>}
            </div>
          );
        })}
      </div>
      <div style={{marginTop:10,fontSize:11,color:"#555",fontStyle:"italic",lineHeight:1.6,fontFamily:"'Barlow',sans-serif"}}>
        "{RANK_TITLES[currentRank]}"
      </div>
    </div>
  );
}

function RecurringTab(p){
  return(
    <div>
      <SecHead label="RECURRING MISSIONS"/>
      <div style={{fontSize:12,color:"#555",letterSpacing:1,marginBottom:14,lineHeight:1.7,fontFamily:"'Barlow',sans-serif"}}>
        Complete these every week or month. Milestones unlock bonus XP and badges. Consistency compounds.
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {p.recurring.map(r=><RecurringCard key={r.id} r={r} ac={p.ac} onComplete={p.completeRecurring}/>)}
      </div>

}

function RecurringCard({r,ac,onComplete}){
  ac=ac||"#6366f1";
  const [expanded,setExpanded]=useState(false);
  const nextMs=r.milestones.find(m=>m.completions>r.totalCompletions);
  const lastMs=r.milestones.filter(m=>m.completions<=r.totalCompletions).pop();
  const pct=nextMs?Math.round((r.totalCompletions/nextMs.completions)*100):100;
  return(
    <div style={{background:"#080810",border:"1px solid #111",borderLeft:`3px solid ${ac}`,padding:14}}>
      <div onClick={()=>setExpanded(!expanded)} style={{cursor:"pointer"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
          <div style={{flex:1}}>
            <div style={{fontSize:15,marginBottom:2}}>{r.icon} <span style={{fontWeight:600,color:"#e5e5e5",fontFamily:"'Barlow',sans-serif"}}>{r.title}</span></div>
            <div style={{fontSize:10,letterSpacing:2,color:ac,marginTop:2,fontFamily:"'Share Tech Mono',monospace"}}>{r.frequency.toUpperCase()} • +{r.xpPerCompletion} XP{r.bountyPerCompletion>0?` • +${r.bountyPerCompletion}`:""}</div>
          </div>
          <div style={{textAlign:"right",flexShrink:0,marginLeft:12}}>
            <div style={{fontSize:16,fontWeight:900,color:ac}}>{r.totalCompletions}x</div>
            <div style={{fontSize:7,color:"#444"}}>COMPLETED</div>
          </div>
        </div>
        {nextMs&&(
          <div style={{marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
              <span style={{fontSize:8,color:"#555"}}>→ {nextMs.label}</span>
              <span style={{fontSize:8,color:ac}}>{r.totalCompletions}/{nextMs.completions}</span>
            </div>
            <div style={{height:2,background:"#0d0d1a"}}><div style={{height:"100%",width:`${pct}%`,background:"linear-gradient(90deg,#6366f1,#a78bfa)",transition:"width 0.6s"}}/></div>
          </div>
        )}
      </div>
      {expanded&&(
        <div style={{borderTop:"1px solid #0a0a14",paddingTop:10,marginTop:4}}>
          <div style={{fontSize:13,color:"#666",lineHeight:1.7,marginBottom:10,fontFamily:"'Barlow',sans-serif"}}>{r.description}</div>
          <div style={{marginBottom:10}}>
            <Lbl>MILESTONE REWARDS</Lbl>
            <div style={{display:"flex",flexDirection:"column",gap:4,marginTop:4}}>
              {r.milestones.map((ms,i)=>{
                const done=r.totalCompletions>=ms.completions;
                return(
                  <div key={i} style={{display:"flex",gap:8,alignItems:"flex-start",padding:"6px 10px",background:done?"#060f06":"#0a0a0a",border:`1px solid ${done?"#4ade8033":"#111"}`}}>
                    <span style={{fontSize:8,color:done?"#4ade80":"#333",flexShrink:0}}>{done?"✓":ms.completions+"x"}</span>
                    <div>
                      <div style={{fontSize:9,color:done?"#4ade80":"#555",fontWeight:700}}>{ms.label}</div>
                      <div style={{fontSize:8,color:done?"#4ade8077":"#333",marginTop:1}}>{ms.reward} {ms.xpBonus>0&&`(+${ms.xpBonus} BONUS XP)`}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
          {lastMs&&<div style={{fontSize:8,color:"#4ade80",padding:"6px 10px",background:"#060f06",border:"1px solid #4ade8022",marginBottom:10}}>✓ LAST UNLOCKED: {lastMs.label}</div>}
        </div>
      )}
      <div style={{display:"flex",gap:7,marginTop:8}}>
        <button onClick={()=>onComplete(r.id)} style={{flex:2,background:ac+"33",border:"1px solid "+ac,color:ac,padding:"8px",fontSize:8,letterSpacing:3,cursor:"pointer",fontFamily:"'Courier New',monospace"}}>✓ MARK COMPLETE</button>
        <button onClick={()=>setExpanded(!expanded)} style={{background:"#1a1a2e",border:"1px solid #2a2a3e",color:"#666",padding:"8px 12px",fontSize:8,cursor:"pointer",fontFamily:"'Courier New',monospace"}}>{expanded?"▲":"▼"}</button>
      </div>
    </div>
  );
}

function RecurringMiniCard({r,ac,onComplete}){
  ac=ac||"#6366f1";
  const nextMs=r.milestones.find(m=>m.completions>r.totalCompletions);
  const pct=nextMs?Math.round((r.totalCompletions/nextMs.completions)*100):100;
  return(
    <div style={{background:"#080810",border:"1px solid #0d0d1a",borderLeft:`3px solid ${ac}`,padding:"10px 14px",marginBottom:6}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
        <span style={{fontSize:11,color:"#ccc"}}>{r.icon} {r.title}</span>

      {nextMs&&<div style={{height:2,background:"#0d0d1a",marginBottom:5}}><div style={{height:"100%",width:`${pct}%`,background:"linear-gradient(90deg,#6366f1,#a78bfa)",transition:"width 0.6s"}}/></div>}
      <div style={{fontSize:7,color:"#444",letterSpacing:2}}>{nextMs?`NEXT: ${nextMs.label} at ${nextMs.completions}x`:"ALL MILESTONES CLEARED"}</div>

}

  const filtered=p.quests.filter(q=>filter==="ALL"?true:filter==="ACTIVE"?!q.completed:filter==="COMPLETE"?q.completed:q.type===filter);
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <SecHead label="QUEST BOARD"/>
        <FatBtn color="#6366f1" onClick={()=>p.setAddingQuest(true)}>+ NEW QUEST</FatBtn>
      </div>
      <div style={{display:"flex",gap:5,overflowX:"auto",paddingBottom:8,marginBottom:12,scrollbarWidth:"none"}}>
        {["ALL","ACTIVE","COMPLETE",...QUEST_TYPES].map(f=><FBtn key={f} label={f} active={filter===f} color="#6366f1" onClick={()=>setFilter(f)}/>)}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>

}

        <FatBtn color="#f97316" onClick={()=>p.setAddingWeapon(true)}>+ ADD ITEM</FatBtn>

function DataPanel({quests,arsenal,missions,recurring,bountyBank,totalXPBank,rankThresholds,settings,onImport,onSaveRankThresholds,onSaveSettings,onChangePin}){
  const [open,setOpen]=useState(false);
  const [sec,setSec]=useState("data");
  const [importText,setImportText]=useState("");
  const [importError,setImportError]=useState("");
  const [importMode,setImportMode]=useState("merge");
  const [editT,setEditT]=useState((rankThresholds||RANK_THRESHOLDS).slice(0,-1).map(formatXP));
  const [editS,setEditS]=useState(settings||DEFAULT_SETTINGS);
  React.useEffect(()=>{setEditS(settings||DEFAULT_SETTINGS);},[settings]);

  function doExport(){
    const data=JSON.stringify({quests,arsenal,missions,recurring,bountyBank,totalXPBank},null,2);
    const blob=new Blob([data],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=`solo-operator-v5-${new Date().toISOString().slice(0,10)}.json`;
    a.click();URL.revokeObjectURL(url);
  }

  function doImport(){
    try{
      const d=JSON.parse(importText);
      if(!d.quests&&!d.missions&&!d.arsenal)throw new Error("Invalid");
      if(importMode==="restore"){
        onImport(d);
      }else{
        const merged={};
        if(d.quests){
          const sMap={};d.quests.forEach(q=>{sMap[q.id]=q;});
          const lMap={};quests.forEach(q=>{lMap[q.id]=q;});
          const mq=d.quests.map(q=>{const lv=lMap[q.id];return lv?{...q,completed:lv.completed}:q;});
          quests.forEach(q=>{if(!sMap[q.id])mq.push(q);});
          merged.quests=mq;
        }
        if(d.arsenal){
          const aMap={};d.arsenal.forEach(w=>{aMap[w.id]=w;});
          const lMap={};arsenal.forEach(w=>{lMap[w.id]=w;});
          const ma=d.arsenal.map(w=>{const lv=lMap[w.id];return lv?{...w,owned:lv.owned}:w;});
          arsenal.forEach(w=>{if(!aMap[w.id])ma.push(w);});
          merged.arsenal=ma;
        }
        if(d.missions)merged.missions=d.missions;
        if(d.recurring){
          const rMap={};d.recurring.forEach(r=>{rMap[r.id]=r;});
          const lMap={};recurring.forEach(r=>{lMap[r.id]=r;});
          merged.recurring=d.recurring.map(r=>{const lv=lMap[r.id];return lv?{...r,totalCompletions:lv.totalCompletions}:r;});
        }
        merged.bountyBank=bountyBank;
        merged.totalXPBank=totalXPBank;
        onImport(merged);
      }
      setImportText("");setImportError("");setOpen(false);
    }catch(e){setImportError("Invalid data. Paste a valid export.");}
  }

function saveRanks(){
  const t=[...editT.map(v=>parseXP(v)),1e15];
  }

  function resetRanks(){const def=RANK_THRESHOLDS.slice(0,-1).map(formatXP);setEditT(def);onSaveRankThresholds(RANK_THRESHOLDS.slice());}

  return(

      <button onClick={()=>setOpen(!open)} style={{background:"#0d0d1a",border:"1px solid #1a1a2e",borderRight:"none",color:settings&&settings.accentColor?settings.accentColor:"#6366f1",padding:"8px 12px",fontSize:10,letterSpacing:2,cursor:"pointer",fontFamily:"'Share Tech Mono',monospace",borderRadius:"4px 0 0 4px"}}>{open?"✕":"⚙ SYS"}</button>
      {open&&(
        <div style={{position:"absolute",bottom:36,right:0,width:310,background:"#0a0a14",border:"1px solid #1a1a2e",borderRadius:"4px 0 0 4px",overflow:"hidden"}}>
          <div style={{display:"flex",borderBottom:"1px solid #1a1a2e"}}>
            {["data","ranks","settings","security"].map(t=><button key={t} onClick={()=>setSec(t)} style={tabStyle(t)}>{t.toUpperCase()}</button>)}
          </div>
          <div style={{padding:16}}>

            {sec==="data"&&<>
              <button onClick={doExport} style={{...bs("#6366f133","#6366f1",""),width:"100%",textAlign:"center",marginBottom:12}}>⬇ EXPORT SAVE</button>
              <div style={{borderTop:"1px solid #1a1a2e",paddingTop:12}}>
                <Lbl>IMPORT MODE</Lbl>
                <div style={{display:"flex",gap:6,marginBottom:10}}>
                  {[{v:"merge",label:"MERGE",desc:"Keep XP & progress"},{v:"restore",label:"RESTORE",desc:"Full overwrite"}].map(m=>(
                    <div key={m.v} onClick={()=>setImportMode(m.v)} style={{flex:1,padding:"8px 10px",background:importMode===m.v?"#6366f122":"#0d0d1a",border:`1px solid ${importMode===m.v?"#6366f1":"#1a1a2e"}`,cursor:"pointer"}}>
                      <div style={{fontSize:10,color:importMode===m.v?"#6366f1":"#555",fontFamily:"'Share Tech Mono',monospace",letterSpacing:2}}>{m.label}</div>
                      <div style={{fontSize:9,color:"#444",marginTop:2,fontFamily:"'Barlow',sans-serif"}}>{m.desc}</div>
                    </div>
                  ))}
                </div>
                <textarea value={importText} onChange={e=>{setImportText(e.target.value);setImportError("");}} rows={4} placeholder="Paste exported JSON here..." style={{marginBottom:6,fontSize:11,resize:"vertical"}}/>
                {importError&&<div style={{fontSize:10,color:"#fb7185",marginBottom:6,fontFamily:"'Share Tech Mono',monospace"}}>{importError}</div>}
                <button onClick={doImport} disabled={!importText} style={{...bs(importMode==="restore"?"#1a0a0a":"#061406",importMode==="restore"?"#fb7185":"#4ade80",""),width:"100%",textAlign:"center",opacity:importText?1:0.4}}>
                  {importMode==="restore"?"⬆ RESTORE (OVERWRITES)":"⬆ MERGE IMPORT"}
                </button>
              </div>
            </>}

            {sec==="ranks"&&<>
              <div style={{fontSize:10,color:"#555",marginBottom:12,fontFamily:"'Barlow',sans-serif",lineHeight:1.6}}>Set the XP required to reach each rank. SSS is always unreachable.</div>
              <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:12}}>
                {RANKS.slice(0,-1).map((r,i)=>(
                  <div key={r} style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",border:`1px solid ${RANK_COLORS[r]}44`,color:RANK_COLORS[r],fontSize:11,fontWeight:700,fontFamily:"'Rajdhani',sans-serif",flexShrink:0}}>{r}</div>
                    <div style={{flex:1,fontSize:9,color:"#444",fontFamily:"'Share Tech Mono',monospace"}}>{RANK_TITLES[r].split("·")[0].trim()}</div>
  <input type="text" value={editT[i]} onChange={e=>{const t=[...editT];t[i]=e.target.value;setEditT(t);}} placeholder="e.g. 1k" style={{width:80,textAlign:"right",background:"#0a0a14",border:"1px solid #1a1a2e",color:"#e5e5e5",padding:"5px 8px",fontSize:11,fontFamily:"'Share Tech Mono',monospace"}}/>  
                  </div>
                ))}
                <div style={{display:"flex",alignItems:"center",gap:10,opacity:0.3}}>
                  <div style={{width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",border:"1px solid #ffffff22",color:"#fff",fontSize:11,fontWeight:700,fontFamily:"'Rajdhani',sans-serif",flexShrink:0}}>SSS</div>
                  <div style={{flex:1,fontSize:9,color:"#444",fontFamily:"'Share Tech Mono',monospace"}}>∞ BEYOND REACH</div>
                  <div style={{width:70,textAlign:"right",fontSize:11,color:"#333",padding:"5px 8px"}}>∞</div>
                </div>
              </div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={saveRanks} style={{...bs("#6366f133","#6366f1",""),flex:2,textAlign:"center"}}>✓ SAVE RANKS</button>
                <button onClick={resetRanks} style={{...bs("#1a1a2e","#666",""),textAlign:"center"}}>↺ RESET</button>
              </div>
            </>}

            {sec==="settings"&&<div style={{display:"flex",flexDirection:"column",gap:14}}><div><Lbl>FONT SIZE — {editS.fontSize}px</Lbl><input type="range" min={11} max={18} value={editS.fontSize} onChange={e=>setEditS(s=>({...s,fontSize:+e.target.value}))} style={{width:"100%",padding:0,height:20}}/><div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#444",marginTop:3}}><span>11px</span><span style={{color:editS.accentColor,fontWeight:700}}>{editS.fontSize}px</span><span>18px</span></div></div><div><Lbl>ACCENT COLOR</Lbl><div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:4}}>{["#6366f1","#38bdf8","#a78bfa","#4ade80","#f97316","#fb7185","#facc15","#2dd4bf","#fff"].map(function(c){return <div key={c} onClick={()=>setEditS(s=>({...s,accentColor:c}))} style={{width:28,height:28,background:c,cursor:"pointer",outline:editS.accentColor===c?"2px solid #fff":"none",borderRadius:2}}/>;})}</div><input value={editS.accentColor} onChange={e=>setEditS(s=>({...s,accentColor:e.target.value}))} placeholder="#6366f1" style={{marginTop:8,fontSize:11}}/></div><div><Lbl>HIGHLIGHT COLOR</Lbl><div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:4}}>{["#facc15","#4ade80","#fb7185","#38bdf8","#a78bfa","#f97316","#2dd4bf","#6366f1","#fff"].map(function(c){return <div key={c} onClick={()=>setEditS(s=>({...s,highlightColor:c}))} style={{width:28,height:28,background:c,cursor:"pointer",outline:editS.highlightColor===c?"2px solid #fff":"none",borderRadius:2}}/>;})}</div><input value={editS.highlightColor} onChange={e=>setEditS(s=>({...s,highlightColor:e.target.value}))} placeholder="#facc15" style={{marginTop:8,fontSize:11}}/></div><div onClick={()=>setEditS(s=>({...s,mobile:!s.mobile}))} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",background:"#0d0d1a",border:"1px solid #1a1a2e",cursor:"pointer"}}><div style={{width:36,height:20,background:editS.mobile?"#333":"#4ade80",borderRadius:10,position:"relative",flexShrink:0,transition:"background 0.2s"}}><div style={{width:16,height:16,background:"#fff",borderRadius:"50%",position:"absolute",top:2,left:editS.mobile?2:18,transition:"left 0.2s"}}/></div><div><div style={{fontSize:11,color:editS.mobile?"#888":"#4ade80",fontFamily:"'Share Tech Mono',monospace",letterSpacing:2}}>{editS.mobile?"MOBILE MODE":"DESKTOP MODE"}</div><div style={{fontSize:9,color:"#444",marginTop:1,fontFamily:"'Barlow',sans-serif"}}>{editS.mobile?"Compact layout":"Wide layout"}</div></div></div><button onClick={()=>onSaveSettings(editS)} style={{...bs("#6366f133","#6366f1",""),width:"100%",textAlign:"center"}}>APPLY SETTINGS</button><button onClick={()=>{const d=DEFAULT_SETTINGS;setEditS(d);onSaveSettings(d);}} style={{...bs("#1a1a2e","#666",""),width:"100%",textAlign:"center"}}>RESET DEFAULTS</button></div>}
            {sec==="security"&&<>
              <div style={{fontSize:11,color:"#888",marginBottom:12,fontFamily:"'Barlow',sans-serif",lineHeight:1.6}}>Reset PIN. The app will prompt you to create a new one on next open.</div>
              <button onClick={clearPin} style={{...bs("#1a0a0a","#fb7185",""),width:"100%",textAlign:"center"}}>🔓 RESET PIN</button>
            </>}

          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
